<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixVault</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2312100d'/%3E%3Cpath d='M20 15h10c10 0 16 4 16 12 0 6-4 10-11 12l10 10H44L35 40h-5v9H20V15zm10 8v10h4c6 0 9-2 9-5s-3-5-9-5h-4z' fill='%23c8944f'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/desktop.css?v=39">
</head>
<body>

<header id="toolbar">
  <div id="toolbar-row1">
    <span class="brand">PixVault</span>
    <div class="ctrl-group" id="fav-group">
      <span class="chip fav-chip heart-hollow" id="fav-chip">♡ 收藏夹<span class="n">0</span></span>
      <span class="chip dislike-chip" id="dislike-chip">💔 不喜欢<span class="n">0</span></span>
      <button id="btn-clear-dislikes" title="清空不喜欢列表（不删文件）" style="display:none">✕ 清空</button>
      <button id="btn-delete-disliked" title="删除所有不喜欢的图片">🗑 删除</button>
    </div>
    <div id="controls">
      <span id="count-label"></span>
      <button id="btn-refresh" title="重新扫描 (R)">↻</button>
      <div class="ctrl-group">
        <button id="btn-mode-toggle" title="切换随机/顺序 (M)">🎲 随机</button>
        <button id="btn-q" title="随机一张 (Q)">🎲</button>
        <button id="btn-slideshow" title="幻灯片播放 (S)">▶</button>
        <select id="slide-interval" title="播放间隔秒数">
          <option value="3">3s</option>
          <option value="5" selected>5s</option>
          <option value="10">10s</option>
          <option value="15">15s</option>
          <option value="30">30s</option>
          <option value="60">60s</option>
        </select>
      </div>
      <div class="ctrl-group">
        <button id="btn-mode" title="网格 (G)">⊞</button>
        <button id="btn-color-group" title="按颜色分组" style="display:none">🎨 颜色分组</button>
        <button id="btn-browse" title="全部浏览 (B)">☷</button>
        <button id="hamburger" title="菜单">☰</button>
      </div>
      <div class="theme-picker" id="theme-picker" title="主题">
        <span class="theme-swatch" data-theme-value="amber"></span>
        <span class="theme-swatch" data-theme-value="emerald"></span>
        <span class="theme-swatch" data-theme-value="rose"></span>
        <span class="theme-swatch" data-theme-value="mono"></span>
      </div>
    </div>
  </div>
  <div id="toolbar-row2">
    <nav class="chip-bar" id="tag-bar"></nav>
    <nav class="chip-bar" id="cat-bar"></nav>
  </div>
</header>

<main id="main-view">
  <section id="single-mode">
    <button id="gallery-close" type="button" title="返回网格 (Esc)">✕</button>
    <div class="pos-indicator empty" id="pos-indicator"></div>
    <img id="main-img" src="" alt="">
    <button class="nav-arrow left" id="btn-left">◀</button>
    <button class="nav-arrow right" id="btn-right">▶</button>
    <div id="info-overlay">
      <div class="img-name" id="info-name" title="点击展开完整文件名"></div>
      <div class="img-meta" id="info-meta"></div>
      <div class="img-tags" id="info-tags"></div>
      <div class="fav-badge" id="info-fav" style="display:none"></div>
    </div>
  </section>
  <section id="gallery-mode">
    <div class="grid" id="gallery-grid"></div>
  </section>
</main>

<nav id="mobile-bar">
  <button id="mb-fav" title="收藏">♡<span class="mlbl">收藏</span></button>
  <button id="mb-dislike" title="不喜欢">✕<span class="mlbl">不喜欢</span></button>
  <button id="mb-random" title="随机">🎲<span class="mlbl">随机</span></button>
  <button id="mb-slideshow" title="播放">▶<span class="mlbl"><span id="mb-interval">5s</span></span></button>
  <button id="mb-grid" title="网格">⊞<span class="mlbl">网格</span></button>
  <button id="mb-browse" title="全部浏览">☷<span class="mlbl">全部</span></button>
</nav>

<div id="sidebar-overlay"></div>
<aside id="sidebar">
  <div id="sidebar-view"></div>
  <div id="sidebar-tags"></div>
  <div id="sidebar-cats"></div>
</aside>

<div id="modal-overlay">
  <div id="modal-header">
    <span id="modal-title"></span>
    <button id="modal-close">✕</button>
  </div>
  <div id="modal-grid"></div>
</div>
<div id="modal-preview">
  <button class="mp-close" id="mp-close">✕</button>
  <img id="mp-img" src="" alt="">
</div>

<div id="loading-indicator"></div>
<div id="error-toast"></div>
<div id="favorite-toast">♥</div>
<footer id="hint">
  <kbd>←</kbd><kbd>→</kbd> 历史 &nbsp; <kbd>Q</kbd> 随机 &nbsp; <kbd>Space</kbd> 收藏 &nbsp; <kbd>⌦</kbd> 不喜欢 &nbsp; <kbd>C</kbd> 清记录 &nbsp; <kbd>S</kbd> 播放 &nbsp; <kbd>G</kbd> 网格 &nbsp; <kbd>B</kbd> 全部浏览 &nbsp; <kbd>M</kbd> 模式
</footer>

<script src="/static/app.js?v=52"></script>
</body>
</html>
