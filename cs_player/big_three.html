<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS The Big Three — ZywOo · donk · m0NESY</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #080818;
            --bg-mid: #100a38;
            --bg-light: #0d0d22;
            --text-primary: #d8d8e8;
            --text-secondary: #9999bb;
            --text-highlight: #c0ccff;
            --text-bright: #d0d8ff;
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --glass-accent-bg: rgba(100,120,255,0.06);
            --glass-accent-border: rgba(120,150,255,0.14);
            --gold: #ffd700;
            --zywoo-1: #6c7cff;
            --zywoo-2: #a8b4ff;
            --donk-1: #ff7070;
            --donk-2: #ffa888;
            --monesy-1: #00d090;
            --monesy-2: #00e8b0;
            --font-stack: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-stack);
            background: linear-gradient(180deg, #080818 0%, #100a38 15%, #0c1238 30%, #0d0d22 50%, #0a0a1e 70%, #080818 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
        }

        section {
            padding: 40px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .section-label {
            text-align: center;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #8888aa;
            margin-bottom: 28px;
        }

        /* Glass cards */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
        }

        .glass-accent {
            background: var(--glass-accent-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-accent-border);
            border-radius: 16px;
            padding: 24px;
        }

        /* Layout grids */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .container { padding: 0 14px; }
            section { padding: 28px 0; }
        }

        /* Scroll animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Content sections go here -->
    </div>
    <script>
        // Data and charts go here
    </script>
</body>
</html>
